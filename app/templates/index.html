<!DOCTYPE html>
<html>
<head>
    <title>IPL AI Engine</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

<header>
    🏏 IPL AI Commentary
    <span class="live-dot"></span>
</header>

<div class="container">

    <!-- Scoreboard -->
    <div class="scoreboard">
        <div>
            <div class="team">RCB</div>
            <div class="meta">Kohli vs Bumrah</div>
        </div>

        <div class="score" id="score">0/0</div>

        <div>
            <div class="team">MI</div>
            <div class="meta" id="over">0.0 overs</div>
        </div>
    </div>

    <!-- Metrics -->
    <div class="metrics">
        <div class="metric">
            <div class="label">Run Rate</div>
            <div class="value" id="rr">0.0</div>
        </div>

        <div class="metric">
            <div class="label">Pressure</div>
            <div class="value" id="pressure">-</div>
        </div>

        <div class="metric">
            <div class="label">Win %</div>
            <div class="value highlight" id="win">0</div>
        </div>
    </div>

    <!-- Action -->
    <div class="action">
        <button class="btn" onclick="startMatch()">▶ Start Match</button>
        <button class="btn" onclick="stopMatch()">⏸ Stop</button>
    </div>

    <!-- Commentary (Main Focus) -->
    <div class="main-card">
        <div class="title">🎙 Live Commentary</div>
        <div class="big-text" id="commentary">
            Waiting for first ball...
        </div>
    </div>

    <!-- Secondary Data -->
    <div class="grid">

        <div class="card">
            <div class="title">📊 Analysis</div>
            <div class="text" id="analysis">-</div>
        </div>

        <div class="card">
            <div class="title">🔥 Hype</div>
            <div class="text hype" id="hype">-</div>
        </div>

        <div class="card">
            <div class="title">📈 Prediction</div>
            <div class="text prediction" id="prediction">-</div>
        </div>

    </div>

</div>

<script src="/static/js/app.js"></script>

</body>
</html>
